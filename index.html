<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Explorer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #101010; font-family: -apple-system, 'SF Pro Display', sans-serif; color: #E0E0E0; overflow: hidden; }

#map {
  position: absolute;
  top: 0; left: 0; right: 0;
  bottom: 148px; /* height of bottom bar */
}
#fog-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 400; }

/* Hide Leaflet zoom controls */
.leaflet-control-zoom { display: none !important; }
.leaflet-control-attribution { font-size: 9px !important; opacity: 0.4; }

/* ── HUD top-left ── */
#hud {
  position: absolute; top: 14px; left: 14px; z-index: 500;
  background: rgba(16,16,16,0.88); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.10); border-radius: 12px;
  padding: 10px 14px; display: flex; gap: 14px; align-items: flex-start;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 44px; }
.stat-lbl { font-size: 10px; color: #606070; letter-spacing: 0.06em; text-transform: uppercase; }
.stat-val { font-size: 15px; font-weight: 700; color: #E0E0E0; }
.stat-val.good  { color: #00E080; }
.stat-val.warn  { color: #F0A000; }
.stat-val.bad   { color: #E03020; }

/* ── Follow button top-right ── */
#follow-btn {
  position: absolute; top: 14px; right: 14px; z-index: 500;
  background: rgba(16,16,16,0.88); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.10); border-radius: 10px;
  padding: 9px 14px; font-size: 13px; font-weight: 600; color: #707080;
  cursor: pointer; display: none;
}
#follow-btn.active { border-color: #00A0E0; color: #00A0E0; }

/* ── Bottom bar ── */
#bottom {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 500;
  background: #101010;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px 14px 30px;
  display: flex; flex-direction: column; gap: 8px;
}
#main-btn {
  width: 100%; padding: 17px; border: none; border-radius: 10px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  background: #00A0E0; color: #101010;
  transition: background 0.15s, opacity 0.15s;
}
#main-btn.tracking { background: #E03020; color: #F0F0F0; }
#main-btn:disabled { opacity: 0.35; }

#sec-row { display: flex; gap: 8px; }
.sec-btn {
  flex: 1; padding: 13px 0; background: #1A1A1A;
  border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  font-size: 14px; font-weight: 600; color: #A0A0B0; cursor: pointer;
  transition: all 0.15s; text-align: center;
}
.sec-btn:disabled { opacity: 0.30; }
.sec-btn.active { background: rgba(0,160,224,0.12); border-color: #00A0E0; color: #00A0E0; }

/* ── Menu overlay ── */
#menu-overlay {
  position: absolute; inset: 0; z-index: 600;
  background: rgba(10,10,10,0.72); backdrop-filter: blur(8px);
  display: none; align-items: flex-end; justify-content: center;
}
#menu-overlay.open { display: flex; }
#menu-panel {
  width: 100%; background: #181818;
  border-top: 1px solid rgba(255,255,255,0.10);
  border-radius: 20px 20px 0 0;
  padding: 18px 16px 40px;
  display: flex; flex-direction: column; gap: 10px;
}
.menu-btn {
  width: 100%; padding: 16px; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  background: #222; color: #D0D0D0;
  text-align: center; transition: background 0.12s;
}
.menu-btn.danger { color: #E03020; }
.menu-btn.back   { background: #00A0E0; color: #101010; }

/* ── Draw cursor on map ── */
#map.drawing { cursor: crosshair; }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="fog-canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="stat">
    <span class="stat-lbl">Distance</span>
    <span class="stat-val" id="s-dist">0 m</span>
  </div>
  <div class="stat">
    <span class="stat-lbl">Area</span>
    <span class="stat-val" id="s-area">0 m²</span>
  </div>
  <div class="stat" id="s-acc-wrap" style="display:none">
    <span class="stat-lbl">Accuracy</span>
    <span class="stat-val" id="s-acc">—</span>
  </div>
</div>

<button id="follow-btn" onclick="toggleFollow()">Follow</button>

<!-- Bottom bar -->
<div id="bottom">
  <button id="main-btn" onclick="toggleTracking()">Use Location</button>
  <div id="sec-row">
    <button class="sec-btn" id="menu-btn"  onclick="openMenu()">Menu</button>
    <button class="sec-btn" id="draw-btn"  onclick="toggleDraw()">Draw Path</button>
  </div>
</div>

<!-- Menu overlay -->
<div id="menu-overlay">
  <div id="menu-panel">
    <button class="menu-btn back"   onclick="closeMenu()">Back</button>
    <button class="menu-btn"        onclick="menuSave()">Save</button>
    <label  class="menu-btn" id="load-label">Load<input type="file" accept=".json" onchange="menuLoad(event)" style="display:none"></label>
    <button class="menu-btn danger" onclick="menuClear()">Clear Data</button>
    <button class="menu-btn" id="units-btn" onclick="toggleUnits()">Imperial Units</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── constants ────────────────────────────────────────────────────────────────
const INNER_R_M    = 150;
const MID_R_M      = 500;
const FOG_OUTER    = 0.75;
const FOG_MID      = 0.50;
const MIN_DIST_M   = 8;
const MIN_ACCURACY = 60;   // ignore GPS fixes worse than this (meters)
const STORAGE_KEY  = 'explorer_trail_v1';

// ── state ────────────────────────────────────────────────────────────────────
// trail is an array of SEGMENTS: [[{lat,lng}, ...], [...], ...]
// Each segment is an independent island; no line is drawn between segments.
let segments     = [];   // persisted
let activeSegIdx = null; // index of segment currently being GPS-appended
let currentPos   = null;
let tracking     = false;
let watchId      = null;
let followMe     = false;
let drawMode     = false;
let drawSegment  = [];   // vertices placed in current draw session
let drawMarkers  = [];
let drawPolyline = null;
let posMarker    = null;
let metric       = true;
let totalDist    = 0;

// ── load persisted data ───────────────────────────────────────────────────────
(function loadStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.segments) segments = data.segments;
    if (data.metric !== undefined) metric = data.metric;
    totalDist = computeTotalDist();
  } catch(e) {}
})();

function saveStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ segments, metric }));
  } catch(e) {}
}

// ── map ───────────────────────────────────────────────────────────────────────
const map = L.map('map', { center: [40,-20], zoom: 3, zoomControl: false, attributionControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',  { maxZoom: 19, pane: 'shadowPane' }).addTo(map);

map.on('dragstart', () => { if (!drawMode) setFollow(false); });
map.on('move zoom resize viewreset', redrawFog);
map.on('click', onMapClick);

// ── canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('fog-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const r = document.getElementById('map').getBoundingClientRect();
  canvas.width  = r.width;  canvas.height = r.height;
  canvas.style.cssText = `position:absolute;top:${r.top}px;left:${r.left}px;width:${r.width}px;height:${r.height}px;pointer-events:none;z-index:400`;
}

// ── fog render ────────────────────────────────────────────────────────────────
// Revealed areas should look LIGHT (map visible) against a dark fog.
// The underlying tiles are now a light basemap; fog is a dark overlay.
// Inner 150m: 0% fog (fully visible)
// 150-500m:   50% fog
// 500m+:      75% fog

function metersToPixels(lat, m) {
  const p1 = map.latLngToContainerPoint([lat, 0]);
  const p2 = map.latLngToContainerPoint([lat + m / 111320, 0]);
  return Math.abs(p2.y - p1.y);
}

function buildMask(w, h, radiusM) {
  // Returns an OffscreenCanvas with opaque pixels wherever trail points/segments are within radiusM
  const c = new OffscreenCanvas(w, h);
  const x = c.getContext('2d');
  x.fillStyle = 'rgba(0,0,0,1)';
  x.strokeStyle = 'rgba(0,0,0,1)';
  x.lineJoin = 'round'; x.lineCap = 'round';

  const allSegs = currentPos
    ? [...segments, [currentPos]]
    : segments;

  for (const seg of allSegs) {
    if (seg.length === 0) continue;
    const r = metersToPixels(seg[0].lat, radiusM);
    x.lineWidth = r * 2;
    x.beginPath();
    const p0 = map.latLngToContainerPoint([seg[0].lat, seg[0].lng]);
    x.arc(p0.x, p0.y, r, 0, Math.PI*2); x.fill();
    for (let i = 1; i < seg.length; i++) {
      const pa = map.latLngToContainerPoint([seg[i-1].lat, seg[i-1].lng]);
      const pb = map.latLngToContainerPoint([seg[i].lat,   seg[i].lng]);
      x.beginPath(); x.moveTo(pa.x, pa.y); x.lineTo(pb.x, pb.y); x.stroke();
      x.beginPath(); x.arc(pb.x, pb.y, r, 0, Math.PI*2); x.fill();
    }
  }
  return c;
}

function redrawFog() {
  resizeCanvas();
  const w = canvas.width, h = canvas.height;

  const final = new OffscreenCanvas(w, h);
  const f = final.getContext('2d');

  // 1. Full outer fog
  f.fillStyle = `rgba(14,14,14,${FOG_OUTER})`;
  f.fillRect(0, 0, w, h);

  const allSegs = currentPos ? [...segments, [currentPos]] : segments;
  const hasData = allSegs.some(s => s.length > 0);
  if (!hasData) { ctx.clearRect(0,0,w,h); ctx.drawImage(final,0,0); return; }

  // 2. Build mid mask (500m) and inner mask (150m)
  const midMask   = buildMask(w, h, MID_R_M);
  const innerMask = buildMask(w, h, INNER_R_M);

  // 3. Where midMask is opaque → replace outer fog with mid fog
  const midFogLayer = new OffscreenCanvas(w, h);
  const mf = midFogLayer.getContext('2d');
  mf.drawImage(midMask, 0, 0);
  mf.globalCompositeOperation = 'source-in';
  mf.fillStyle = `rgba(14,14,14,${FOG_MID})`;
  mf.fillRect(0, 0, w, h);

  // Replace the outer-fog pixels in the mid zone
  f.globalCompositeOperation = 'destination-out';
  f.drawImage(midMask, 0, 0);
  f.globalCompositeOperation = 'source-over';
  f.drawImage(midFogLayer, 0, 0);

  // 4. Punch inner zone fully clear
  f.globalCompositeOperation = 'destination-out';
  f.drawImage(innerMask, 0, 0);

  // 5. Blit
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(final, 0, 0);
}

// ── GPS tracking ──────────────────────────────────────────────────────────────
function toggleTracking() {
  tracking ? stopTracking() : startTracking();
}

function startTracking() {
  if (!navigator.geolocation) return;
  tracking = true;
  activeSegIdx = null; // will be set on first valid fix
  setFollow(true);
  updateUI();

  watchId = navigator.geolocation.watchPosition(onPosition, onGpsError,
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
}

function stopTracking() {
  if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  tracking = false;
  currentPos = null;
  activeSegIdx = null;
  if (posMarker) { map.removeLayer(posMarker); posMarker = null; }
  document.getElementById('s-acc-wrap').style.display = 'none';
  document.getElementById('follow-btn').style.display = 'none';
  saveStorage();
  updateUI();
  redrawFog();
}

function onPosition(pos) {
  const { latitude: lat, longitude: lng, accuracy: acc } = pos.coords;

  // Update accuracy display
  const accEl = document.getElementById('s-acc');
  accEl.textContent = metric ? `±${Math.round(acc)}m` : `±${Math.round(acc * 3.281)}ft`;
  accEl.className = 'stat-val ' + (acc < 20 ? 'good' : acc < MIN_ACCURACY ? 'warn' : 'bad');
  document.getElementById('s-acc-wrap').style.display = 'flex';

  // Ignore very inaccurate fixes
  if (acc > MIN_ACCURACY) return;

  currentPos = { lat, lng };

  // Position marker
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:14px;height:14px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 0 4px rgba(0,160,224,0.25)"></div>`,
    iconAnchor: [7,7],
  });
  if (posMarker) posMarker.setLatLng([lat, lng]);
  else posMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);

  if (followMe) map.setView([lat, lng], Math.max(map.getZoom(), 16), { animate: true, duration: 0.5 });

  // Append to current segment — only if moved enough from last point
  if (activeSegIdx === null) {
    // Start a brand new segment (island) — no connection to prior trail
    segments.push([{ lat, lng }]);
    activeSegIdx = segments.length - 1;
  } else {
    const seg = segments[activeSegIdx];
    const last = seg[seg.length - 1];
    const d = haversine(last.lat, last.lng, lat, lng);
    if (d < MIN_DIST_M) return;
    totalDist += d;
    seg.push({ lat, lng });
  }

  saveStorage();
  updateStats();
  redrawFog();
}

function onGpsError(err) {
  stopTracking();
}

// ── draw mode ─────────────────────────────────────────────────────────────────
function toggleDraw() {
  drawMode ? confirmDraw() : startDraw();
}

function startDraw() {
  drawMode = true;
  drawSegment = [];
  document.getElementById('map').classList.add('drawing');
  updateUI();
}

function confirmDraw() {
  // Commit drawn segment as a new independent segment
  if (drawSegment.length > 0) {
    // Interpolate all consecutive vertex pairs
    const pts = [];
    pts.push(drawSegment[0]);
    for (let i = 1; i < drawSegment.length; i++) {
      pts.push(...interpolate(drawSegment[i-1], drawSegment[i], 30));
    }
    segments.push(pts);
    totalDist += segmentLength(pts);
    saveStorage();
    updateStats();
  }
  endDraw();
  redrawFog();
}

function undoDraw() {
  if (drawSegment.length === 0) { endDraw(); return; }
  drawSegment.pop();
  const m = drawMarkers.pop();
  if (m) map.removeLayer(m);
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  if (drawSegment.length > 1) {
    drawPolyline = L.polyline(drawSegment.map(p => [p.lat, p.lng]),
      { color: '#00A0E0', weight: 2, opacity: 0.7, dashArray: '6 4' }).addTo(map);
  }
  if (drawSegment.length === 0) endDraw();
}

function endDraw() {
  drawMode = false;
  drawMarkers.forEach(m => map.removeLayer(m));
  drawMarkers = [];
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  drawSegment = [];
  document.getElementById('map').classList.remove('drawing');
  updateUI();
}

function onMapClick(e) {
  if (!drawMode) return;
  const pt = { lat: e.latlng.lat, lng: e.latlng.lng };
  drawSegment.push(pt);

  // Vertex marker — larger for easier tapping (but tapping no longer undoes)
  const icon = L.divIcon({
    className: '',
    html: `<div style="width:16px;height:16px;border-radius:50%;background:#00A0E0;border:3px solid #F0F0F0;box-shadow:0 0 8px rgba(0,160,224,0.5)"></div>`,
    iconAnchor: [8,8],
  });
  drawMarkers.push(L.marker([pt.lat, pt.lng], { icon }).addTo(map));

  if (drawPolyline) map.removeLayer(drawPolyline);
  if (drawSegment.length > 1) {
    drawPolyline = L.polyline(drawSegment.map(p => [p.lat, p.lng]),
      { color: '#00A0E0', weight: 2, opacity: 0.7, dashArray: '6 4' }).addTo(map);
  }
}

// ── menu ──────────────────────────────────────────────────────────────────────
function openMenu() {
  document.getElementById('menu-overlay').classList.add('open');
  document.getElementById('units-btn').textContent = metric ? 'Imperial Units' : 'Metric Units';
}
function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
}
function menuSave() {
  closeMenu();
  const data = JSON.stringify({ version: 4, segments });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([data], { type: 'application/json' })),
    download: 'explorer-data.json',
  });
  a.click();
}
function menuLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      // Support old format (flat trail array) and new (segments)
      if (data.segments) {
        segments = data.segments;
      } else if (data.trail) {
        segments = [data.trail];
      }
      totalDist = computeTotalDist();
      updateStats();
      saveStorage();
      const last = segments.flatMap(s=>s).pop();
      if (last) map.setView([last.lat, last.lng], 12);
      redrawFog();
    } catch(err) {}
  };
  reader.readAsText(file);
  e.target.value = '';
  closeMenu();
}
function menuClear() {
  if (!confirm('Clear all data?')) return;
  stopTracking();
  segments = []; totalDist = 0; currentPos = null;
  endDraw();
  saveStorage();
  updateStats();
  redrawFog();
  closeMenu();
}
function toggleUnits() {
  metric = !metric;
  saveStorage();
  updateStats();
  closeMenu();
}

// ── follow ────────────────────────────────────────────────────────────────────
function setFollow(val) {
  followMe = val;
  const btn = document.getElementById('follow-btn');
  btn.textContent = 'Follow';
  btn.classList.toggle('active', val);
}
function toggleFollow() { setFollow(!followMe); }

// ── UI state ──────────────────────────────────────────────────────────────────
function updateUI() {
  const mainBtn = document.getElementById('main-btn');
  const menuBtn = document.getElementById('menu-btn');
  const drawBtn = document.getElementById('draw-btn');
  const followBtn = document.getElementById('follow-btn');

  if (drawMode) {
    mainBtn.disabled = true;
    menuBtn.textContent = 'Undo';
    menuBtn.onclick = undoDraw;
    drawBtn.textContent = 'Confirm';
    drawBtn.classList.add('active');
    followBtn.style.display = 'none';
  } else {
    mainBtn.disabled = false;
    mainBtn.textContent = tracking ? 'Stop Tracking' : 'Use Location';
    mainBtn.className = tracking ? 'tracking' : '';
    menuBtn.textContent = 'Menu';
    menuBtn.onclick = openMenu;
    drawBtn.textContent = 'Draw Path';
    drawBtn.classList.remove('active');
    followBtn.style.display = tracking ? 'block' : 'none';
  }
}

// ── stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-dist').textContent = fmtDist(totalDist);
  // Area: sum of all segment lengths × 2 × INNER_R_M (rough corridor area)
  const areaSqM = computeArea();
  document.getElementById('s-area').textContent = fmtArea(areaSqM);
}

function computeTotalDist() {
  return segments.reduce((sum, seg) => sum + segmentLength(seg), 0);
}

function segmentLength(seg) {
  let d = 0;
  for (let i = 1; i < seg.length; i++) d += haversine(seg[i-1].lat, seg[i-1].lng, seg[i].lat, seg[i].lng);
  return d;
}

function computeArea() {
  // Approximate as corridor: total length × diameter (2 × inner radius)
  return computeTotalDist() * (INNER_R_M * 2);
}

function fmtDist(m) {
  if (metric) return m >= 1000 ? `${(m/1000).toFixed(2)} km` : `${Math.round(m)} m`;
  const ft = m * 3.281;
  return ft >= 5280 ? `${(ft/5280).toFixed(2)} mi` : `${Math.round(ft)} ft`;
}

function fmtArea(sqm) {
  if (metric) return sqm >= 1000000 ? `${(sqm/1000000).toFixed(2)} km²` : sqm >= 10000 ? `${(sqm/10000).toFixed(1)} ha` : `${Math.round(sqm)} m²`;
  const sqft = sqm * 10.764;
  return sqft >= 27878400 ? `${(sqft/27878400).toFixed(2)} mi²` : sqft >= 43560 ? `${(sqft/43560).toFixed(1)} ac` : `${Math.round(sqft)} ft²`;
}

// ── helpers ───────────────────────────────────────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, dL = (lat2-lat1)*Math.PI/180, dG = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dL/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function interpolate(a, b, stepM) {
  const total = haversine(a.lat, a.lng, b.lat, b.lng);
  const steps = Math.max(1, Math.floor(total / stepM));
  const pts = [];
  for (let i = 1; i <= steps; i++) {
    const t = i / steps;
    pts.push({ lat: a.lat + (b.lat-a.lat)*t, lng: a.lng + (b.lng-a.lng)*t });
  }
  return pts;
}

// ── init ──────────────────────────────────────────────────────────────────────
updateUI();
updateStats();
window.addEventListener('resize', redrawFog);
setTimeout(redrawFog, 400);
</script>
</body>
</html>
